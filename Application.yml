apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: demo
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/pragya25joshilti/demo.git
    targetRevision: HEAD
    path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
    - CreateNamespace=true
